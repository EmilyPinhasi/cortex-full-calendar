name: Build and release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'manifest.json'
      - 'package.json'
      - 'package-lock.json'
      - 'esbuild.config.mjs'
      - 'styles.css'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute release version
        id: ver
        run: |
          BASE=$(node -p "require('./manifest.json').version.split('.').slice(0,2).join('.')")
          COUNT=$(git rev-list --count HEAD)
          VERSION="${BASE}.${COUNT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.version }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Type-check
        if: steps.check.outputs.exists == 'false'
        run: npm run compile

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Stamp manifest with release version
        if: steps.check.outputs.exists == 'false'
        run: |
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('manifest.json','utf8')); m.version='${{ steps.ver.outputs.version }}'; fs.writeFileSync('manifest.json', JSON.stringify(m, null, '\t')+'\n');"

      - name: Generate release notes from commits
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || true)
          {
            if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
              echo "## Changes since ${PREV_TAG}"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
            else
              echo "## Changes"
              echo
              git log --pretty=format:'- %s (%h)' -n 20
            fi
            echo
            echo
            echo "Built from ${{ github.sha }}."
          } > release-notes.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md \
            main.js manifest.json styles.css
