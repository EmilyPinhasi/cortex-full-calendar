name: Build and release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute release version
        id: ver
        run: |
          BASE=$(node -p "require('./manifest.json').version.split('.').slice(0,2).join('.')")
          COUNT=$(git rev-list --count HEAD)
          VERSION="${BASE}.${COUNT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.version }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Type-check
        if: steps.check.outputs.exists == 'false'
        run: npm run compile

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Stamp manifest with release version
        if: steps.check.outputs.exists == 'false'
        run: |
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('manifest.json','utf8')); m.version='${{ steps.ver.outputs.version }}'; fs.writeFileSync('manifest.json', JSON.stringify(m, null, '\t')+'\n');"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "${{ steps.ver.outputs.version }}" \
            --notes "Automated release from ${{ github.sha }}" \
            main.js manifest.json styles.css
